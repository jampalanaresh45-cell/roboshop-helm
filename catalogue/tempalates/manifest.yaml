apiVersion: v1 
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-catalogue
  namespace: {{ .Release.Namespace }}
data:
  MONGO: "true"
  MONGO_URL: "{{ .Values.configmap.mongoURL }}"
---
apiVersion: apps/v1 
kind: Deployment
metadata:
  name: {{ .Release.Name }}-catalogue
  namespace: {{ .Release.Namespace }}
  labels: 
    project: roboshop
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
  template:
    metadata:
      labels:
        project: roboshop
        component: catalogue
        tier: backend
    spec:
      containers:
      - name: catalogue
        image: "{{ .Values.deployment.imageRepo | default "nginx" }}:{{ .Values.deployment.imageVersion | default "latest" }}"
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-catalogue
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 60
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 10
---
apiVersion: v1 
kind: Service
metadata:
  name: {{ .Release.Name }}-catalogue
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    project: roboshop
    component: catalogue
    tier: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: {{ .Values.service.targetPort | default 8080 }}